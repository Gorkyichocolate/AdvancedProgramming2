version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ap2
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    depends_on:
      - postgres
      - redis
      - payment-service
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/ap2
      - REDIS_URL=redis://redis:6379
      - PAYMENT_SERVICE_URL=payment-service:9001
      - PORT=8001
      - GRPC_PORT=9001
    ports:
      - "8001:8001"
      - "9001:9001"

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    depends_on:
      - postgres
      - redis
      - rabbitmq
    environment:
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/ap2
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - PORT=8002
      - GRPC_PORT=9002
    ports:
      - "8002:8002"
      - "9002:9002"

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    depends_on:
      - rabbitmq
      - redis
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672/
      - REDIS_URL=redis://redis:6379
      - PROVIDER_MODE=SIMULATED
      - SMTP_HOST=localhost
      - SMTP_PORT=1025
      - SMTP_USER=user
      - SMTP_PASSWORD=password
    ports:
      - "8003:8003"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
